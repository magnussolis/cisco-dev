<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin | Cisco Dev</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; }
        .admin-card { background: #1e293b; border-radius: 15px; border: 1px solid #334155; padding: 20px; }
        .table { color: #cbd5e1; }
        .form-control, .form-select { background: #0f172a; border: 1px solid #334155; color: white; }
    </style>
</head>
<body class="p-3 p-md-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-info">Panel Cisco Dev</h2>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Salir</a>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="admin-card shadow">
                    <h5 class="mb-3">Nuevo Script</h5>
                    <form action="/agregar" method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        
                        <input type="text" name="nombre" class="form-control mb-2" placeholder="Nombre" required>
                        <textarea name="descripcion" class="form-control mb-2" placeholder="Descripción"></textarea>
                        <input type="number" step="0.01" name="precio" class="form-control mb-2" placeholder="Precio ($)" required>
                        <input type="text" name="imagen_url" class="form-control mb-2" placeholder="URL Imagen">
                        <select name="categoria" class="form-select mb-3">
                            <option value="Web">Web (Front/Back)</option>
                            <option value="Python">Python</option>
                        </select>
                        <button type="submit" class="btn btn-info w-100 fw-bold">Publicar</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="admin-card shadow">
                    <h5 class="mb-3">Scripts Publicados</h5>
                    <div class="table-responsive">
                        <table class="table table-dark table-hover">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Precio</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for p in plantillas %}
                                <tr>
                                    <td>{{ p.nombre }}</td>
                                    <td class="text-success">${{ p.precio }}</td>
                                    <td>
                                        <a href="{{ url_for('eliminar', id=p.id) }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Seguro?')">Borrar</a>
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
