<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cisco Dev</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: #1e293b; padding: 30px; border-radius: 20px; border: 1px solid #334155; width: 100%; max-width: 400px; }
        .form-control { background: #0f172a; border: 1px solid #334155; color: white; }
        .form-control:focus { background: #0f172a; color: white; border-color: #38bdf8; box-shadow: none; }
        .btn-login { background: #38bdf8; color: #0f172a; fw-bold; border-radius: 10px; width: 100%; }
    </style>
</head>
<body>
    <div class="login-card shadow-lg mx-3">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='images/cisco_dev.png') }}" height="60">
            <h4 class="mt-3 fw-bold">Acceso Administrativo</h4>
        </div>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger py-2 small">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="mb-3">
                <label class="form-label small text-muted">Usuario</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label small text-muted">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-login fw-bold">Entrar al Panel</button>
            <div class="text-center mt-3">
                <a href="/" class="text-info small text-decoration-none">← Volver a la tienda</a>
            </div>
        </form>
    </div>
</body>
</html>
